{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • Bulldog Bookie</title>
    <link rel="stylesheet" href="{% static 'core/admin_dashboard.css' %}" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="logo">Bulldog Bookie</div>
        <nav class="nav">
          <a href="{% url 'home' %}">Home</a>
          <a href="{% url 'wallet' %}">Wallet</a>
          <a href="{% url 'wagers' %}">Wagers</a>
          <a href="{% url 'student_rankings' %}">Rankings</a>
          <a href="{% url 'admin_dashboard' %}">Admin</a>
          <a href="{% url 'login' %}" class="btn">Login</a>
        </nav>
      </div>
    </header>

    <main>
      {% if messages %}
      <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %} {% block content %}{% endblock %}
    </main>

    <footer>
      <hr />
      <p>&copy; 2025 Bulldog Bookie</p>
    </footer>
  </body>
</html>
